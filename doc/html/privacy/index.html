<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DiscouRSS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rosarivo:ital@0;1&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange: #ff6600;
      --blurple: #5865F2;
    }

    body {
      max-width: 40em;
      margin: 2em auto;
      font-family: "Rosarivo", cursive;
      font-weight: 400;
      font-style: normal;
    }

    header {
      position: relative;
      border-bottom: 3px solid transparent;
      margin-bottom: 1.5em;
      padding-bottom: 1.5em;
    }

    header a.logo {
      background: url(https://lh3.googleusercontent.com/e9KEwTlTK4mtdSlUaavtR6pW4I-KwHTjnF6KCdMzkGRFRZze1cE) no-repeat;
      background-size: contain;
      padding: 0.325em 0 0.325em 2.5em;
      font-size: 2em;
      color: black;
      text-decoration: none;
    }

    footer {
      border-top: 3px solid transparent;
      margin-top: 1.5em;
      padding-top: 1.5em;
      text-align: center;
    }

    header, footer {
      border-image: linear-gradient(to right, var(--orange), var(--blurple)) 1;
    }

    footer a {
      white-space: nowrap;
    }

    /* 
     * Button code:
     * https://uiverse.io/BHARGAVPATEL1244/great-catfish-18
     */
    .button {
      position: absolute;
      right: 0;
      top: -0.25em;
      text-decoration: none;
      font-weight: bold;
      outline: none;
      cursor: pointer;
      border: none;
      padding: 0.75rem 1.5rem;
      margin: 0;
      font-family: inherit;
      font-size: inherit;
      display: inline-block;
      letter-spacing: 0.05rem;
      font-weight: 700;
      font-size: 1.25em;
      border-radius: 500px;
      overflow: hidden;
      background: var(--blurple);
      color: ghostwhite;
    }

    .button span {
      position: relative;
      z-index: 10;
      transition: color 0.4s;
    }

    .button:hover span {
      color: #fff;
    }

    .button::before,
    .button::after {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .button::before {
      content: "";
      background: var(--orange);
      width: 120%;
      left: -10%;
      transition: transform 0.2s cubic-bezier(0.3, 1, 0.8, 1);
    }

    .button:hover::before {
      transform: translate3d(100%, 0, 0);
    }
  </style>
</head>
<body>
<header>
  <a href="https://discourss.stevarino.com/" class="logo">DiscouRSS</a>
  <a href="https://workspace.google.com/marketplace/app/discourss/107272671119" class="button"><span>Get Started</span></a>
</header>

<h1>Privacy Policy</h1>
<p>Any data gathered will only be used to ensure proper functioning of the app. No permanent data gathering is performed and all logs are purged after one week.</p>


<footer>
  <a href="https://discourss.stevarino.com/">DiscouRSS</a>
  &middot;
  <a href="https://discourss.stevarino.com/privacy/">Privacy Policy</a>
  &middot;
  <a href="https://discourss.stevarino.com/terms/">Terms of Use</a>
  &middot;
  <a href="https://github.com/stevarino/discourss">Github</a>
  &middot;
  <a href="https://github.com/stevarino/discourss/issues/new">Report a Problem</a>
</footer>
</body></html>
