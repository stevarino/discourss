<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DiscouRSS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rosarivo:ital@0;1&display=swap" rel="stylesheet">

  <style>
    body {
      max-width: 40em;
      margin: 2em auto;
      font-family: "Rosarivo", cursive;
      font-weight: 400;
      font-style: normal;
    }
    header {
      position: relative;
      border-bottom: 1px solid #000;
      margin-bottom: 1em;
      padding-bottom: 1em;
    }
    footer {
      border-top: 1px solid #000;
      margin-top: 1em;
      padding-top: 1em;
      text-align: center;
    }
    footer a {
      white-space: nowrap;
    }
    /* 
     * Button code:
     * https://uiverse.io/BHARGAVPATEL1244/great-catfish-18
     */
    .button {
      position: absolute;
      right: 0;
      top: -1em;
      text-decoration: none;
      font-weight: bold;
      outline: none;
      cursor: pointer;
      border: none;
      padding: 0.75rem 1.5rem;
      margin: 0;
      font-family: inherit;
      font-size: inherit;
      display: inline-block;
      letter-spacing: 0.05rem;
      font-weight: 700;
      font-size: 14px;
      border-radius: 500px;
      overflow: hidden;
      background: #4285F4;
      color: ghostwhite;
    }

    .button span {
      position: relative;
      z-index: 10;
      transition: color 0.4s;
    }

    .button:hover span {
      color: #fff;
    }

    .button::before,
    .button::after {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .button::before {
      content: "";
      background: #34A853;
      width: 120%;
      left: -10%;
      transition: transform 0.2s cubic-bezier(0.3, 1, 0.8, 1);
    }

    .button:hover::before {
      transform: translate3d(100%, 0, 0);
    }
  </style>
</head>
<body>
<header>
  <a href="https://discourss.stevarino.com/">DiscouRSS</a>
  <a href="https://script.google.com/macros/s/AKfycbxtvC7at1Ru1wBUFUexXzP2Pn5SSHCyil7U_Cwrr8Jk_WEqjNwP-cTQSOw4rHQt_y2IJQ/exec" class="button"><span>Create Your Own</span></a>
</header>
